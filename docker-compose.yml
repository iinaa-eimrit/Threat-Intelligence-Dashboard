version: '3.8'

services:
  backend:
    build: ./backend
    container_name: threatintel_backend
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - mongo
      - redis
    restart: unless-stopped
    volumes:
      - ./backend:/app

  celery_worker:
    build: ./backend
    container_name: threatintel_celery
    command: celery -A app.celery_worker worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - backend
      - redis
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:15
    container_name: threatintel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: threatintel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: threatintel_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: threatintel
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: threatintel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus_data:
  grafana_data:
  postgres_data:
  mongo_data:
  redis_data:

  prometheus:
    image: prom/prometheus
    container_name: threatintel_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./backend/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: threatintel_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
