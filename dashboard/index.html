<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threat Intelligence Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; background: #f7f7fa; }
        h1 { color: #2c3e50; }
        .section { margin-bottom: 2em; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #2c3e50; color: #fff; }
        tr:nth-child(even) { background: #f2f2f2; }
        .alert-high { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Threat Intelligence Dashboard</h1>
    <div class="section">
        <h2>Recent Alerts</h2>
        <table id="alerts-table">
            <thead>
                <tr><th>ID</th><th>Severity</th><th>Description</th><th>Status</th><th>Time</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="section">
        <h2>Recent Events</h2>
        <table id="events-table">
            <thead>
                <tr><th>ID</th><th>IP</th><th>Event</th><th>Timestamp</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="section">
        <h2>Top Attacking IPs</h2>
        <canvas id="ipChart" width="400" height="150"></canvas>
    </div>
    <div class="section">
        <h2>Event Timeline</h2>
        <canvas id="eventTimeline" width="400" height="150"></canvas>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        async function fetchAlerts() {
            const res = await fetch('/api/alerts');
            const data = await res.json();
            const tbody = document.querySelector('#alerts-table tbody');
            tbody.innerHTML = '';
            data.forEach(a => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${a.id}</td><td class="alert-${a.severity}">${a.severity}</td><td>${a.description}</td><td>${a.status}</td><td>${a.created_at}</td>`;
                tbody.appendChild(tr);
            });
        }
        async function fetchEvents() {
            const res = await fetch('/api/events');
            const data = await res.json();
            const tbody = document.querySelector('#events-table tbody');
            tbody.innerHTML = '';
            data.forEach(e => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${e.id}</td><td>${e.ip}</td><td>${e.event}</td><td>${e.timestamp}</td>`;
                tbody.appendChild(tr);
            });
            // Top IPs chart
            const ipCounts = {};
            data.forEach(e => { ipCounts[e.ip] = (ipCounts[e.ip] || 0) + 1; });
            const ips = Object.keys(ipCounts);
            const counts = Object.values(ipCounts);
            new Chart(document.getElementById('ipChart'), {
                type: 'bar',
                data: { labels: ips, datasets: [{ label: 'Events', data: counts, backgroundColor: '#2c3e50' }] },
                options: { responsive: true }
            });
            // Event timeline chart
            const timeline = {};
            data.forEach(e => {
                const t = e.timestamp.split('T')[0];
                timeline[t] = (timeline[t] || 0) + 1;
            });
            const dates = Object.keys(timeline);
            const eventCounts = Object.values(timeline);
            new Chart(document.getElementById('eventTimeline'), {
                type: 'line',
                data: { labels: dates, datasets: [{ label: 'Events', data: eventCounts, borderColor: '#c0392b', fill: false }] },
                options: { responsive: true }
            });
        }
        fetchAlerts();
        fetchEvents();
        setInterval(fetchAlerts, 10000);
        setInterval(fetchEvents, 10000);
    </script>
</body>
</html>
